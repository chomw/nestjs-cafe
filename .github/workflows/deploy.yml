name: Blue Cafe CI/CD Pipeline

# 1. 방아쇠 (Trigger): main 브랜치에 push가 발생할 때만 이 로봇이 작동합니다.
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub이 제공하는 가상의 리눅스 컴퓨터에서 실행됨
    
    steps:
      # 2. GitHub 저장소에 올라온 최신 코드를 가상 컴퓨터로 내려받습니다.
      - name: 1. 최신 소스 코드 체크아웃
        uses: actions/checkout@v4

      # 3. 내려받은 코드를 통째로 AWS EC2 서버로 전송합니다. (SCP 방식)
      - name: 2. EC2 서버로 프로젝트 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "." # 현재 폴더의 모든 것을
          target: "/home/ubuntu/cafe-api" # EC2의 이 폴더로 보냄 (없으면 자동 생성)

      # 4. EC2 서버에 원격으로 접속해서 도커 컴포즈 명령어를 실행합니다.
      - name: 3. EC2 서버에서 Docker Compose 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 전송된 폴더로 이동
            cd /home/ubuntu/cafe-api
            
            # 기존에 켜져있던 컨테이너를 안전하게 종료
            sudo docker-compose down
            
            # 최신 코드로 이미지를 다시 굽고 백그라운드로 실행
            sudo docker-compose --env-file env/.env.production up --build -d
            
            # (선택) 더 이상 쓰지 않는 찌꺼기 도커 이미지 삭제 (디스크 용량 확보)
            sudo docker image prune -f